version: "2"
cloud:
  organization: ""
  project: ""
  hostname: ""
servers: []
sql:
  - engine: "postgresql"
    schema: "internal/db/migrations"
    queries: "internal/modules/auth/adapters/persistence/postgres/queries"
    gen:
      go:
        package: "authdb"
        out: "internal/db/sqlc/auth"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
overrides:
  go: null
plugins: []
rules: []
options: {}
